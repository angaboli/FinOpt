name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: finopt_test
          POSTGRES_USER: finopt
          POSTGRES_PASSWORD: finopt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finopt -d finopt_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      FINOPT_DATABASE_URL: postgresql+asyncpg://finopt:finopt@localhost:5432/finopt_test
      FINOPT_JWT_SECRET_KEY: ci-secret-key-change-me
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint backend
        working-directory: backend
        run: ruff check . && black --check . && mypy src
      - name: Test backend
        working-directory: backend
        run: coverage run -m pytest && coverage report

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        working-directory: frontend
        run: npm install
      - name: Check frontend
        working-directory: frontend
        run: npm run lint && npm run typecheck && npm test -- --watchAll=false
