services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finopt
      POSTGRES_USER: finopt
      POSTGRES_PASSWORD: finopt
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finopt -d finopt"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - finopt_postgres:/var/lib/postgresql/data

volumes:
  finopt_postgres:
